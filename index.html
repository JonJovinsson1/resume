<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jon Jovinsson</title>
  <style>
    :root {
      --fg: #111;
      --muted: #444;
      --rule: #cfcfcf;
      --bg: #fff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: Georgia, "Times New Roman", Times, serif;
      line-height: 1.65;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 72px 24px 96px;
    }

    h1 {
      margin: 0 0 0.2rem;
      font-size: 2.1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    p {
      margin: 0 0 1rem;
      font-size: 1.05rem;
    }

    .intro {
      color: var(--muted);
      max-width: 42rem;
    }

    hr {
      border: 0;
      border-top: 1px solid var(--rule);
      margin: 2rem 0;
    }

    h2 {
      margin: 0 0 1rem;
      font-size: 1.1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    ul {
      margin: 0;
      padding-left: 1.2rem;
    }

    li {
      margin: 0 0 1rem;
    }

    .paper-title {
      display: block;
      font-size: 1.08rem;
      font-weight: 600;
      margin-bottom: 0.15rem;
      color: #0645ad;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.14em;
    }

    .paper-title:visited {
      color: #0b0080;
    }

    .paper-title:hover,
    .paper-title:focus {
      color: #042f75;
    }

    .paper-meta {
      color: var(--muted);
      font-size: 0.98rem;
    }

  </style>
</head>
<body>
  <main>
    <h1>Jon Jovinsson</h1>
    <p class="intro">
      Hey, Here is what I've been working on.
    </p>

    <hr>

    <section aria-labelledby="papers">
      <h2 id="papers">Papers</h2>
      <ul>
        <li>
          <a class="paper-title" href="greyhounds.pdf">Leak-Free Greyhound Race Forecasting with Gradient Boosting and Sequence-Attention Ensembles (2026)</a>
          <span class="paper-meta">PDF</span>
        </li>
        <li>
          <a class="paper-title" href="sleepaponea.pdf">Sleep Apnoea Risk Assessment from 3D Facial Scans (2024)</a>
          <span class="paper-meta">PDF</span>
        </li>
      </ul>
    </section>

  </main>
</body>
</html>
